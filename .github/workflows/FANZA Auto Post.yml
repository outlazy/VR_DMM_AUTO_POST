name: FANZA VR Auto Post (Stable)

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 */6 * * *"   # 6時間おき（UTC）

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run VR auto post
        env:
          FORCE_DETAIL_DOMAIN: "www"
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASS: ${{ secrets.WP_PASS }}
          DMM_API_ID: ${{ secrets.DMM_API_ID }}
          DMM_AFFILIATE_ID: ${{ secrets.DMM_AFFILIATE_ID }}
          CATEGORY: ${{ secrets.CATEGORY }}
          POST_LIMIT: "2"     # 1回で2本
          RECENT_DAYS: "3"    # 直近3日を“新作”扱い
          SCRAPE_DESC: "1"  # ← 安全運用なら0のまま推奨
          AGE_GATE_COOKIE: ${{ secrets.AGE_GATE_COOKIE }}  # ← 先生の“自分の”クッキー
          HITS: "10"
          MAX_PAGES: "2"           # 通常時の取得ページ数
          MAX_PAGES_FALLBACK: "6"  # 見つからない時はここまで自動拡張
          EXCLUDE_PRE_RELEASE: "0" # 0=予約商品も含めて投稿（1で発売前を除外）
          TAG_FIELDS: "genre"      # タグ化するiteminfoフィールド（カンマ区切り。例: "genre,actress,maker"）
          MAX_TAGS: "20"           # タグ数の上限
        run: python fanza_vr_auto_post.py
